<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>State Bank of Bharat - Official Website</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="styles.css">
</head>

<body class="bg-light">

    <!-- Skip to Content Link -->
    <a href="#main-content" class="visually-hidden-focusable position-absolute top-0 start-0 p-2 bg-warning text-dark">
        Skip to main content
    </a>

    <!-- Header -->
    <header class="bg-primary text-white text-center py-4">
        <h1 class="fw-bold">STATE BANK OF INDIA</h1>
        <p class="mb-0">The Banker to Every Indian</p>
    </header>

    <div class="container-fluid">
        <div class="row min-vh-100">

            <!-- Sidebar Navigation -->
            <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
                <div class="container-fluid">

                    <a class="navbar-brand fw-bold" href="#" onclick="loadPage('home', this)">
                        SBI Digital
                    </a>

                    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                        <span class="navbar-toggler-icon"></span>
                    </button>

                    <div class="collapse navbar-collapse" id="navbarNav">
                        <ul class="navbar-nav ms-auto">

                            <li class="nav-item">
                                <a href="#" class="nav-link" data-page="home" onclick="loadPage('home', this)">
                                    Home
                                </a>
                            </li>

                            <li class="nav-item">
                                <a href="#" class="nav-link" data-page="about" onclick="loadPage('about', this)">
                                    About
                                </a>
                            </li>

                            <li class="nav-item">
                                <a href="#" class="nav-link" data-page="services" onclick="loadPage('services', this)">
                                    Services
                                </a>
                            </li>

                            <li class="nav-item">
                                <a href="#" class="nav-link" data-page="netbanking"
                                    onclick="loadPage('netbanking', this)">
                                    Netbanking
                                </a>
                            </li>

                            <li class="nav-item">
                                <a href="#" class="nav-link" data-page="contact" onclick="loadPage('contact', this)">
                                    Contact
                                </a>
                            </li>

                        </ul>
                    </div>
                </div>
            </nav>
            <div id="alert-container" class="container mt-3"></div>

            <!-- SPA Dynamic Content -->
            <main id="main-content" class="container py-4" tabindex="-1" aria-live="polite"></main>

        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-dark text-white text-center py-3">
        <p class="mb-0">www.sbi.co.in</p>
        <p class="mb-0">&copy; 2026 State Bank of India. All rights reserved.</p>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <script src="pages_data.js"></script>
    <script src="services_data.js"></script>
    <script src="auth_data.js"></script>
    <script src="main.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            loadPage("home");
        });
    </script>

</body>

</html>

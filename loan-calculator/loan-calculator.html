<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Calculator</title>
</head>

<body>
    <h1>Loan Calculator</h1>
    <form id="loan-form">
        <h1> Loan Calculator</h1>
        <div>
            <p>Select Loan Type: </p>
            <input type="radio" id="house-loan" name="loan-type" value="house" checked>
            <label for="house-loan">House Loan</label>
            <input type="radio" id="car-loan" name="loan-type" value="car">
            <label for="car-loan">Car Loan</label>
            <input type="radio" id="personal-loan" name="loan-type" value="personal">
            <label for="personal-loan">Personal Loan</label>
        </div>
        <div>
            <p> the intrest rate for the selected loan type is: </p>
            <input type="text" id="interest-rate" name="interest-rate" readonly>
        </div>
        <div>
            <p>enter the amount for which you want the loan: </p>
            <label for="loan-amount">Loan Amount:</label>
            <input type="number" id="loan-amount" name="loan-amount" required>
        </div>
        <div>
            <p> enter the dueration for which you want the loan: </p>
            <label for="loan-term">Loan Term (years):</label>
            <input type="number" id="loan-term" name="loan-term" required>
        </div>
        <div>
            <input type="submit" value="calculate EMI">
        </div>
    </form>
    <div>
        <h2>EMI Result:</h2>
        <p id="emi-result"></p>
    </div>
    <script>
        document.addEventListener('DOMContentLoaded', function () {
            const loanForm = document.getElementById('loan-form');
            const loanTypeRadios = document.getElementsByName('loan-type');
            const interestRateInput = document.getElementById('interest-rate');
            const loanAmountInput = document.getElementById('loan-amount');
            const loanTermInput = document.getElementById('loan-term');
            const emiResult = document.getElementById('emi-result');

            function updateForm() {
                let selectedLoanType = document.querySelector('input[name="loan-type"]:checked').value;
                let interestRate;
                let minAmount, maxAmount, minTerm, maxTerm;

                switch (selectedLoanType) {
                    case 'house':
                        interestRate = 9.0;
                        minAmount = 500000;
                        maxAmount = 5000000;
                        minTerm = 5;
                        maxTerm = 30;
                        break;
                    case 'car':
                        interestRate = 12.0;
                        minAmount = 100000;
                        maxAmount = 1000000;
                        minTerm = 1;
                        maxTerm = 7;
                        break;
                    case 'personal':
                        interestRate = 15.0;
                        minAmount = 10000;
                        maxAmount=1000000;
                        minTerm = 1;
                        maxTerm = 5;
                        break;
                    default:
                        interestRate = 0;
                        minAmount = 0;
                        maxAmount = 0;
                        minTerm = 0;
                        maxTerm = 0;
                }
                interestRateInput.value = interestRate + '%';
                loanAmountInput.min = minAmount;
                loanAmountInput.max = maxAmount;
                loanTermInput.min = minTerm;
                loanTermInput.max = maxTerm;
            }

            loanTypeRadios.forEach(radio => {
                radio.addEventListener('change', updateForm);
            });

            loanForm.addEventListener('submit', function (event) {
                event.preventDefault();
                const loanAmount = parseFloat(document.getElementById('loan-amount').value);
                const loanTerm = parseFloat(document.getElementById('loan-term').value);
                const interestRate = parseFloat(interestRateInput.value);

                if (isNaN(loanAmount) || isNaN(loanTerm) || isNaN(interestRate)) {
                    loanForm.reportValidity();
                    emiResult.textContent = 'Please enter valid numbers for loan amount, term, and interest rate.';
                    return;
                }

                const monthlyInterestRate = (interestRate / 100) / 12;
                const numberOfPayments = loanTerm * 12;

                const emi = (loanAmount * monthlyInterestRate) / (1 - Math.pow(1 + monthlyInterestRate, -numberOfPayments));
                emiResult.textContent = 'Your EMI is: ' + emi.toFixed(2);
            });

            // Initialize the interest rate on page load
            updateForm();
        });
    </script>
</body>

</html>
